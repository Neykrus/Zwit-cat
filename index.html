<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Vape Analytics: Фінальна версія</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 1850px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; }
        #drop-zone { border: 3px dashed #1a73e8; padding: 30px; text-align: center; color: #1a73e8; cursor: pointer; border-radius: 8px; background: #f8fbff; margin-bottom: 20px; }
        .btn-container { text-align: center; margin: 20px 0; display: flex; justify-content: center; gap: 15px; }
        .btn { padding: 15px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; color: white; transition: 0.3s; }
        .btn-refresh { background: #28a745; }
        .btn-excel { background: #107c41; display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 20px; }
        th, td { padding: 8px; text-align: left; border: 1px solid #ddd; }
        th { background: #f1f4f9; position: sticky; top: 0; cursor: pointer; user-select: none; }
        th:hover { background: #e2e8f0; }
        th.sort-asc::after { content: " ↑"; }
        th.sort-desc::after { content: " ↓"; }
        .total-row { background: #e8f0fe; font-weight: bold; font-size: 12px; }
        .diff-up { color: #28a745; font-weight: bold; }
        .diff-down { color: #dc3545; font-weight: bold; }
        .delta-box { font-size: 10px; display: block; margin-top: 2px; }
        .accordion-item { border: 1px solid #ddd; border-radius: 8px; margin-top: 15px; overflow: hidden; }
        .accordion-header { background: #f8f9fa; padding: 12px 15px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .accordion-content { display: none; padding: 15px; background: white; overflow-x: auto; }
        .accordion-active .accordion-content { display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 Аналіз динаміки категорій</h1>
    <div id="drop-zone">1. Завантажте файли звіту</div>
    <input type="file" id="file-input" style="display: none" multiple>
    
    <div id="file-settings"></div>
    <div class="btn-container">
        <button id="update-btn" class="btn btn-refresh" style="display:none">2. Сформувати звіт</button>
        <button id="excel-btn" class="btn btn-excel">📗 Завантажити в Excel</button>
    </div>
    
    <div id="comparison-output"></div>
    <div id="detailed-reports"></div>
</div>

<script>
const GROUPS = {
    "Pod-системи": ["Elf Bar", "GeekVape", "Innokin", "Joyetech", "Lost Vape", "Ovns", "Oxva", "Upends Upox", "Smok", "Suorin", "Vaporesso", "Voopoo", "ZQ", "Eleaf", "Nevoks"],
    "Компоненти (Набори)": ["Набір Elfliq", "Набір ChaserLab", "Набір FlavorLab", "Набір Octobar", "Набір Hype", "Набір Fluffy Puff", "Набір Aroma Max", "Набір Wick Wire", "Набір Dead Horse", "Набір Punch", "Набір Рефрост", "Набір Dr. Cloud", "Аромат бустер Uliq", "Набір Alchemist", "Набір Fluffy Puff Organic", "Набір In Bottle Puzzle", "Набір Nova", "Набір SteamPuff", "Набір Lucky", "Набір Vape Shot", "Набір Marvellous", "Набір Twisted", "Набір Flip", "Набір Phantom", "Набір Uliq", "Набір Dinner Lady", "Набір Mix Bar"],
    "Снюс": ["Street", "Cuba", "Scooper", "Odens", "Siberia", "Velo", "Vika"],
    "Напої": ["Напої"],
    "Ароматизатори": ["Ароматизатори Alchemist", "1E8HT 60 ml", "Ароматизатори Yummy", "Ароматизатори Wick&Wire", "Ароматизатори InBottle", "Ароматизатори Hype", "Ароматизатори Lucky", "Ароматизатори Katana", "Ароматизатори Troublemaker", "Ароматизатор Flavorlab", "Ароматизотор ElfLiQ", "Ароматизатори Vape Shot", "Ароматизатор 420", "Ароматизатор Elix", "Ароматизатор Nectar", "Ароматизатор Creepy", "Ароматизатор Sqwiz", "Ароматизатор Chaser", "Ароматизатори Flip"],
    "Одноразові Pod-системи": ["Одноразові Pod-системи"],
    "Чайна Суміш": ["Чайна суміш", "Чайна суміш Zodiac", "Чайна суміш Molfar", "Чайна суміш Heven", "Чайна суміш Atom", "Чайна суміш Daim", "Чайна суміш 4:20", "Чайна суміш Cult", "Чайна суміш Yummy", "Чайна суміш Creepy", "Чайна суміш Unity", "Чайна суміш Pixtea", "Чайна Суміш Jibiar"],
    "Запальнички": ["Запальнички"],
    "CBD товари": ["CBD Candy", "CBD Bears", "Мікродозінг", "Напої CBD", "CBD - KreaTea", "Гумка CBD", "CBD товари"],
    "Кальяни та комплектуючі": ["Вугілля", "Totem Hookah", "Кальяни", "Аксесуари", "Колби", "Кальяни та комплектуючі"],
    "Комплектуючі": ["Картриджі Lost Vape", "Випарники Lost Vape", "Випарники Smok", "Випарники Vaporesso", "Випарники Voopoo", "Випарники ZQ", "Картриджі Elf Bar", "Картриджі Eleaf", "Картриджі Geek Vape", "Картриджі Oxva", "Картриджі Smok", "Картриджі Suorin", "Картриджі Vaporesso", "Картриджі Upends", "Катриджі Voopoo", "Картриджі ZQ", "Випарники Nevoks", "Картриджі Nevoks", "Картриджі OVNS", "Випарник Joyetech", "Випаровувач", "Комплектуючі", "Акумулятори", "Аккумулятор"],
    "Акцизна група": ["Тютюн для кальяну", "Табачні стіки", "Акцизна група товарів"],
    "Бонг Та Комплектуючі": ["Гріндер", "Фільтр Для Самокруток", "Папір Для Фільтрів", "Блант", "Бонг", "Джоінти", "Додаткова Комплектація", "Ковпак Для Пляшки", "Папір Для Самокруток", "Трубка", "Бонг Та Комплектуючі"],
    "Мерч": ["Мерч"],
    "Периферія": ["Периферія"],
    "Спеціальні пропозиції": ["Спеціальні пропозиції"]
};

let rawReports = [];
let sortConfig = { key: 'r', direction: 'desc' };

function clean(v) {
    if(!v) return 0;
    let s = v.toString().replace(/\s/g, '').replace(/ /g, '').replace(/шт\.|грн/g, '').replace(',', '.');
    return parseFloat(s) || 0;
}

document.getElementById('drop-zone').onclick = () => document.getElementById('file-input').click();
document.getElementById('file-input').onchange = (e) => {
    rawReports = [];
    document.getElementById('file-settings').innerHTML = "";
    Array.from(e.target.files).forEach((file, idx) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            let data;
            if (file.name.endsWith('.xlsx')) {
                const wb = XLSX.read(new Uint8Array(ev.target.result), {type:'array'});
                data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
            } else {
                data = Papa.parse(ev.target.result, {header:false}).data;
            }
            handleData(data, file.name, idx);
        };
        if (file.name.endsWith('.xlsx')) reader.readAsArrayBuffer(file);
        else reader.readAsText(file);
    });
};

function handleData(rows, fileName, id) {
    let res = { id, fileName, date: "", data: {}, totalR: 0, totalP: 0, totalCost: 0, totalQ: 0 };
    const norm = {}; for (let g in GROUPS) norm[g] = GROUPS[g].map(i => i.toLowerCase().trim());
    
    rows.forEach((row, i) => {
        if (i > 0 && row[1] && row[1] !== "Категорії") {
            res.totalR += clean(row[5]); res.totalP += clean(row[6]); res.totalCost += clean(row[3]); res.totalQ += clean(row[2]);
        }
    });

    let usedIndices = new Set();
    for (let g in norm) {
        let q=0, r=0, p=0, c=0;
        rows.forEach((row, i) => {
            if (i > 0 && norm[g].includes((row[1]||"").toString().toLowerCase().trim())) {
                q += clean(row[2]); c += clean(row[3]); r += clean(row[5]); p += clean(row[6]);
                usedIndices.add(i);
            }
        });
        res.data[g] = { q, c, r, p, m: (r?p/r*100:0), rs: (res.totalR?r/res.totalR*100:0), ps: (res.totalP?p/res.totalP*100:0) };
    }

    let oR=0, oP=0, oQ=0, oC=0;
    rows.forEach((row, i) => {
        if (i > 0 && !usedIndices.has(i) && row[1] && row[1] !== "Категорії") {
            oR += clean(row[5]); oP += clean(row[6]); oQ += clean(row[2]); oC += clean(row[3]);
        }
    });
    res.data["Інші товари"] = { q: oQ, c: oC, r: oR, p: oP, m: (oR?oP/oR*100:0), rs: (res.totalR?oR/res.totalR*100:0), ps: (res.totalP?oP/res.totalP*100:0) };

    rawReports.push(res);
    renderFileRow(res);
    if (rawReports.length >= 2) document.getElementById('update-btn').style.display = "block";
}

function renderFileRow(r) {
    let div = document.createElement('div');
    div.innerHTML = `<div style="padding:10px; border:1px solid #ddd; margin-bottom:5px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; background:white;">
        <span>📄 ${r.fileName}</span>
        <input type="month" onchange="updateDate(${r.id}, this.value)" style="padding:8px;">
    </div>`;
    document.getElementById('file-settings').appendChild(div);
}

function updateDate(id, date) { rawReports.find(x => x.id === id).date = date; }

document.getElementById('update-btn').onclick = function() {
    if (rawReports.some(r => !r.date)) { alert("Оберіть дату!"); return; }
    generateReport();
    document.getElementById('excel-btn').style.display = "block";
};

function generateReport() {
    let sortedFiles = [...rawReports].sort((a, b) => new Date(a.date) - new Date(b.date));
    renderComparison(sortedFiles[0], sortedFiles[1]);
    renderDetails(sortedFiles);
}

function setSort(key) {
    if (sortConfig.key === key) sortConfig.direction = sortConfig.direction === 'desc' ? 'asc' : 'desc';
    else { sortConfig.key = key; sortConfig.direction = 'desc'; }
    generateReport();
}

function getDeltaFormatted(v2, v1, isPercent = false) {
    let diff = v2 - v1;
    let cls = diff >= 0 ? 'diff-up' : 'diff-down';
    let sign = diff >= 0 ? '+' : '';
    let percentChange = (v1 !== 0 && !isPercent) ? ` (${sign}${((v2/v1-1)*100).toFixed(1)}%)` : '';
    return `<span class="delta-box ${cls}">${sign}${diff.toLocaleString()}${isPercent?'%':''}${percentChange}</span>`;
}

function renderComparison(p, c) {
    let html = `<div style="background:#28a745; color:white; padding:15px; border-radius:8px; margin-top:20px; font-weight:bold; text-align:center;">📊 ПОРІВНЯННЯ ТА ДИНАМІКА: ${c.date} vs ${p.date}</div>`;
    const getSortClass = (key) => sortConfig.key === key ? `class="sort-${sortConfig.direction}"` : '';
    html += `<table><thead><tr><th onclick="setSort('name')" ${getSortClass('name')}>Група</th><th onclick="setSort('r')" ${getSortClass('r')}>Виторг (грн)</th><th onclick="setSort('p')" ${getSortClass('p')}>Прибуток (грн)</th><th onclick="setSort('m')" ${getSortClass('m')}>Маржа %</th><th onclick="setSort('rs')" ${getSortClass('rs')}>Доля Вит. %</th><th onclick="setSort('ps')" ${getSortClass('ps')}>Доля Приб. %</th></tr></thead><tbody>`;
    
    let tableData = [...Object.keys(GROUPS), "Інші товари"].map(g => ({ name: g, cur: c.data[g] || {r:0, rs:0, p:0, m:0, ps:0}, prev: p.data[g] || {r:0, rs:0, p:0, m:0, ps:0} }));
    tableData.sort((a, b) => {
        let valA = sortConfig.key === 'name' ? a.name : a.cur[sortConfig.key];
        let valB = sortConfig.key === 'name' ? b.name : b.cur[sortConfig.key];
        return sortConfig.direction === 'asc' ? (valA > valB ? 1 : -1) : (valA < valB ? 1 : -1);
    });

    tableData.forEach(row => {
        html += `<tr><td><b>${row.name}</b></td><td>${row.cur.r.toLocaleString()}<br>${getDeltaFormatted(row.cur.r, row.prev.r)}</td><td>${row.cur.p.toLocaleString()}<br>${getDeltaFormatted(row.cur.p, row.prev.p)}</td><td>${row.cur.m.toFixed(2)}%<br>${getDeltaFormatted(row.cur.m, row.prev.m, true)}</td><td>${row.cur.rs.toFixed(2)}%<br>${getDeltaFormatted(row.cur.rs, row.prev.rs, true)}</td><td>${row.cur.ps.toFixed(2)}%<br>${getDeltaFormatted(row.cur.ps, row.prev.ps, true)}</td></tr>`;
    });
    
    html += `</tbody><tfoot><tr class="total-row"><td>РАЗОМ</td><td>${c.totalR.toLocaleString()}<br>${getDeltaFormatted(c.totalR, p.totalR)}</td><td>${c.totalP.toLocaleString()}<br>${getDeltaFormatted(c.totalP, p.totalP)}</td><td>${(c.totalP/c.totalR*100).toFixed(2)}%</td><td>100.00%</td><td>100.00%</td></tr></tfoot></table>`;
    document.getElementById('comparison-output').innerHTML = html;
}

function renderDetails(sorted) {
    let cont = document.getElementById('detailed-reports');
    cont.innerHTML = "<h3 style='margin-top:30px'>📂 Деталізація по періодах</h3>";
    sorted.forEach(report => {
        let item = document.createElement('div');
        item.className = "accordion-item";
        item.innerHTML = `<div class="accordion-header" onclick="this.parentElement.classList.toggle('accordion-active')"><span>📅 Дані за ${report.date}</span><span>🔽</span></div>
        <div class="accordion-content">
            <table><tr><th>Група</th><th>Виторг</th><th>Прибуток</th><th>Доля Вит. %</th><th>Доля Приб. %</th></tr>
            ${Object.keys(report.data).map(g => `<tr><td>${g}</td><td>${report.data[g].r.toLocaleString()}</td><td>${report.data[g].p.toLocaleString()}</td><td>${report.data[g].rs.toFixed(2)}%</td><td>${report.data[g].ps.toFixed(2)}%</td></tr>`).join('')}
            </table>
        </div>`;
        cont.appendChild(item);
    });
}

document.getElementById('excel-btn').onclick = async function() {
    let sorted = [...rawReports].sort((a, b) => new Date(a.date) - new Date(b.date));
    let p = sorted[0], c = sorted[1];
    const wb = new ExcelJS.Workbook();
    const ws = wb.addWorksheet('Динаміка');
    ws.addRow(["", p.date, "", "", "", "", "", "", c.date, "", "", "", "", "", "", "Динаміка"]);
    ws.mergeCells(1, 2, 1, 8); ws.mergeCells(1, 9, 1, 15); ws.mergeCells(1, 16, 1, 22);
    ws.addRow(["Категорії", "К-сть", "Собівартість", "Виторг", "Прибуток", "Маржа", "Доля в виторгу", "Доля в прибутку", "К-сть", "Собівартість", "Виторг", "Прибуток", "Маржа", "Доля в виторгу", "Доля в прибутку", "К-сть", "Собівартість", "Виторг", "Прибуток", "Маржа", "Доля в виторгу", "Доля в прибутку"]);
    
    [...Object.keys(GROUPS), "Інші товари"].forEach(g => {
        let d1 = p.data[g] || {q:0, c:0, r:0, p:0, m:0, rs:0, ps:0}, d2 = c.data[g] || {q:0, c:0, r:0, p:0, m:0, rs:0, ps:0};
        const cp = (v2, v1) => v1 ? (v2/v1-1) : 0;
        let rowData = [g, d1.q, d1.c, d1.r, d1.p, d1.m/100, d1.rs/100, d1.ps/100, d2.q, d2.c, d2.r, d2.p, d2.m/100, d2.rs/100, d2.ps/100, cp(d2.q, d1.q), cp(d2.c, d1.c), cp(d2.r, d1.r), cp(d2.p, d1.p), (d2.m-d1.m)/100, (d2.rs-d1.rs)/100, (d2.ps-d1.ps)/100];
        let nr = ws.addRow(rowData);
        for(let i=16; i<=22; i++) {
            let cl = nr.getCell(i); cl.numFmt = '0.00%';
            if(rowData[i-1] > 0.0001) { cl.fill = {type:'pattern', pattern:'solid', fgColor:{argb:'FFC6EFCE'}}; cl.font = {color:{argb:'FF006100'}}; }
            else if(rowData[i-1] < -0.0001) { cl.fill = {type:'pattern', pattern:'solid', fgColor:{argb:'FFFFC7CE'}}; cl.font = {color:{argb:'FF9C0006'}}; }
        }
        [6,7,8,13,14,15].forEach(i => nr.getCell(i).numFmt = '0.00%');
    });
    ws.columns.forEach(col => col.width = 17);
    const buf = await wb.xlsx.writeBuffer();
    saveAs(new Blob([buf]), `Analytics_${c.date}.xlsx`);
};
</script>
</body>
</html>
